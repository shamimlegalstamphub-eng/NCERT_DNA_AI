<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded futuristic background -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  
  <!-- DNA double helix strands -->
  <!-- Left strand curves -->
  <path d="M 30,20 Q 50,50 30,80" fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" />
  <!-- Right strand curves -->
  <path d="M 70,20 Q 50,50 70,80" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" />
  
  <!-- DNA rungs / connecting bonds -->
  <line x1="32" y1="30" x2="68" y2="30" stroke="#475569" stroke-width="3" stroke-dasharray="1 5" />
  <line x1="45" y1="40" x2="55" y2="40" stroke="#475569" stroke-width="3" stroke-dasharray="1 5" />
  <line x1="50" y1="50" x2="50" y2="50" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" />
  <line x1="45" y1="60" x2="55" y2="60" stroke="#475569" stroke-width="3" stroke-dasharray="1 5" />
  <line x1="32" y1="70" x2="68" y2="70" stroke="#475569" stroke-width="3" stroke-dasharray="1 5" />

  <!-- DNA nucleotides nodes (Glow accents) -->
  <circle cx="30" cy="20" r="5" fill="#818cf8" />
  <circle cx="30" cy="80" r="5" fill="#818cf8" />
  <circle cx="70" cy="20" r="5" fill="#34d399" />
  <circle cx="70" cy="80" r="5" fill="#34d399" />
</svg>
