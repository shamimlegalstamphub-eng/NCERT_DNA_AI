  <body>
    <div id="error-fallback" style="display: none; position: fixed; inset: 0; background: maroon; color: white; padding: 24px; font-family: monospace; z-index: 999999; overflow: auto;"></div>
    <script>
      function reportDiagnostics(data) {
        fetch("/api/diagnostics/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        }).catch(err => console.warn("Diagnostic sync failed", err));
      }

      window.addEventListener("error", (event) => {
        const errorContainer = document.getElementById("error-fallback");
        if (errorContainer) {
          errorContainer.style.display = "block";
          errorContainer.innerHTML = `
            <h2 style="margin-top: 0;">⚠️ BOOTSTRAP RUNTIME CRASH</h2>
            <p><strong>Message:</strong> ${event.message}</p>
            <p><strong>File:</strong> ${event.filename}:${event.lineno}:${event.colno}</p>
            <pre style="background: rgba(0,0,0,0.4); padding: 12px; overflow-x: auto;">${event.error ? event.error.stack : 'No stack trace available'}</pre>
          `;
        }
        reportDiagnostics({
          type: "error",
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : 'No stack'
        });
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reasonStr = event.reason ? (event.reason.message || String(event.reason)) : "Unknown rejection";
        if (reasonStr.toLowerCase().includes("websocket") || reasonStr.toLowerCase().includes("vite")) {
          // Gracefully suppress expected WebSocket errors resulting from HMR being disabled
          event.preventDefault();
          return;
        }
        reportDiagnostics({
          type: "unhandledrejection",
          message: reasonStr,
          stack: event.reason && event.reason.stack ? event.reason.stack : "No stack"
        });
      });

      // Intercept console.error
      const originalConsoleError = console.error;
      console.error = function(...args) {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(" ");
        if (msg.toLowerCase().includes("websocket") || msg.toLowerCase().includes("failed to connect") || msg.includes("[vite]")) {
          // Quietly ignore benign websocket failure logging
          return;
        }
        originalConsoleError.apply(console, args);
        reportDiagnostics({
          type: "console_error",
          message: msg
        });
      };

      console.log("Telemetry script loaded");
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
