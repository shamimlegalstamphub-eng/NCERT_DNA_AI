<div
  id="error-fallback"
  style="display:none;position:fixed;inset:0;background:maroon;color:white;padding:24px;font-family:monospace;z-index:999999;overflow:auto;"
></div>

<script>
function reportDiagnostics(data){
fetch("/api/diagnostics/log",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
}).catch(()=>{});
}

window.addEventListener("error",(event)=>{
const container=document.getElementById("error-fallback");
if(container){
container.style.display="block";
container.innerHTML=`
<h2>⚠️ BOOTSTRAP RUNTIME CRASH</h2>
<p><strong>Message:</strong> ${event.message}</p>
<p><strong>File:</strong> ${event.filename}:${event.lineno}:${event.colno}</p>
<pre>${event.error?event.error.stack:"No stack trace available"}</pre>
`;
}
reportDiagnostics({
type:"error",
message:event.message,
filename:event.filename,
lineno:event.lineno,
colno:event.colno,
stack:event.error?.stack
});
});

window.addEventListener("unhandledrejection",(event)=>{
const msg=event.reason?.message||String(event.reason||"Unknown rejection");

if(
msg.toLowerCase().includes("vite")||
msg.toLowerCase().includes("websocket")
){
event.preventDefault();
return;
}

reportDiagnostics({
type:"unhandledrejection",
message:msg,
stack:event.reason?.stack
});
});

const oldError=console.error;

console.error=function(...args){

const msg=args.map(x=>typeof x==="object"
?JSON.stringify(x)
:String(x)).join(" ");

if(
msg.toLowerCase().includes("websocket")||
msg.includes("[vite]")
){
return;
}

oldError.apply(console,args);

reportDiagnostics({
type:"console_error",
message:msg
});
};

console.log("Telemetry loaded.");
</script>
